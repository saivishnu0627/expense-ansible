- name: configure DB server
  hosts: db
  become: yes
  vars:
    login_host: 172.31.75.28
  tasks:
  - name: Install MySQL Server
    ansible.builtin.dnf:
      name: mysql-server
      state: latest

  - name: Start and Enable MySQL Sever
    ansible.builtin.service:
      name: mysqld
      state: started
      enabled: yes

  #check password is already setup or not
  - name: check DB connection
    community.mysql.mysql.info:
      login_user: root
      login_password: ExpenseApp@1
      login_host: "{{ login_host }}"
      filter: version
    ignore_errors: yes
    register: mysql_conection_output

  - name: print output
    ansible.builtin.debug:
      msg: "Output: {{mysql_conection_output}} "
  